<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" readonly>
        <div class="button_container">

            <button onclick="currentDisplay = currentDisplay + '1';
            document.querySelector('#display').value = currentDisplay;
            ">1</button>

            <button onclick="currentDisplay = currentDisplay + '2';
            document.querySelector('#display').value = currentDisplay;
            ">2</button>

            <button onclick="currentDisplay = currentDisplay + '3';
            document.querySelector('#display').value = currentDisplay;
            ">3</button>

            <button  class="button1" onclick="currentDisplay = '';
            document.querySelector('#display').value = currentDisplay;
            ">C</button>

            <button class="button1" onclick="currentDisplay = currentDisplay.slice(0, -1);
            document.querySelector('#display').value = currentDisplay;
            "><i class="fa-solid fa-delete-left"></i></button>

            <button onclick="currentDisplay = currentDisplay + '4';
            document.querySelector('#display').value = currentDisplay;
            ">4</button>

            <button onclick="currentDisplay = currentDisplay + '5';
            document.querySelector('#display').value = currentDisplay;
            ">5</button>

            <button onclick="currentDisplay = currentDisplay + '6';
            document.querySelector('#display').value = currentDisplay;
            ">6</button>

            <button class="button1" onclick="currentDisplay = currentDisplay + '+';
            document.querySelector('#display').value = currentDisplay;
            ">+</button>

            <button class="button1" onclick="currentDisplay = currentDisplay + '-';
            document.querySelector('#display').value = currentDisplay;
            ">-</button>

           <button onclick="currentDisplay = currentDisplay + '7';
            document.querySelector('#display').value = currentDisplay;
            ">7</button>

            <button onclick="currentDisplay = currentDisplay + '8';
            document.querySelector('#display').value = currentDisplay;
            ">8</button>

            <button onclick="currentDisplay = currentDisplay + '9';
            document.querySelector('#display').value = currentDisplay;
            ">9</button>

            <button class="button1" onclick="currentDisplay = currentDisplay + '*';
            document.querySelector('#display').value = currentDisplay;
            ">*</button>

            <button class="button1" onclick="currentDisplay = currentDisplay + '/';
            document.querySelector('#display').value = currentDisplay;
            ">/</button>

            <button onclick="currentDisplay = currentDisplay + '0';
            document.querySelector('#display').value = currentDisplay;
            ">0</button>

            <button onclick="currentDisplay = currentDisplay + '00';
            document.querySelector('#display').value = currentDisplay;
            ">00</button>

            <button onclick="currentDisplay = currentDisplay + '.';
            document.querySelector('#display').value = currentDisplay;
            ">.</button>

            <button class="button1" onclick="computeLog10();">log10</button>

            <button class="button1" onclick="computeLog();">log</button>

            <button class="button1" onclick="currentDisplay = eval(currentDisplay);
            document.querySelector('#display').value = currentDisplay;
            ">=</button>

            <button class="button1" onclick="computeSin();">sin</button>

            <button class="button1" onclick="computeCos();">cos</button>

            <button class="button1" onclick="computeTan();">tan</button>

            <button class="button1" onclick="computeSqrt();"><i class="fa-solid fa-square-root-variable"></i></button>

           
        </div>
    </div>
    <script>
        let currentDisplay = '';
        document.querySelector('#display').value = currentDisplay;

        function computeSin() {
            try {

                let expr = currentDisplay.trim();
                if (expr === '') return;
                
                let value = eval(expr);
                
                let radians = value * Math.PI / 180;
                let result = Math.sin(radians);
                
                if (Math.abs(result) < 1e-12) result = 0;
                
                let formatted = parseFloat(result.toFixed(5)).toString();
                currentDisplay = formatted;
                document.querySelector('#display').value = currentDisplay;
            } catch (e) {
                document.querySelector('#display').value = 'Error';
                currentDisplay = '';
            }
        }

        function computeCos() {
            try {

                let expr = currentDisplay.trim();
                if (expr === '') return;
                
                let value = eval(expr);
                
                let radians = value * Math.PI / 180;
                let result = Math.cos(radians);
                
                if (Math.abs(result) < 1e-12) result = 0;
                
                let formatted = parseFloat(result.toFixed(5)).toString();
                currentDisplay = formatted;
                document.querySelector('#display').value = currentDisplay;
            } catch (e) {
                document.querySelector('#display').value = 'Error';
                currentDisplay = '';
            }
        }

        function computeTan() {
            try {

                let expr = currentDisplay.trim();
                if (expr === '') return;
                
                let value = eval(expr);
                
                let radians = value * Math.PI / 180;
                let result = Math.tan(radians);
                
                if (Math.abs(result) < 1e-12) result = 0;
                
                let formatted = parseFloat(result.toFixed(5)).toString();
                currentDisplay = formatted;
                document.querySelector('#display').value = currentDisplay;
            } catch (e) {
                document.querySelector('#display').value = 'Error';
                currentDisplay = '';
            }
        }

        function computeLog() {
            try {
                let expr = currentDisplay.trim();

                if (expr === '') return;

                let value = eval(expr);

                if (value <= 0) {
                    document.querySelector('#display').value = 'Error';
                    currentDisplay = ''; return;
                }
                
                let result = Math.log(value);

                let formatted = parseFloat(result.toFixed(5)).toString();
                currentDisplay = formatted;
                document.querySelector('#display').value = currentDisplay;
            } catch (e) {
                document.querySelector('#display').value = 'Error';
                currentDisplay = '';
            }
        }

        function computeLog10() {
            try {
                let expr = currentDisplay.trim();

                if (expr === '') return;

                let value = eval(expr);

                if (value <= 0) {
                    document.querySelector('#display').value = 'Error';
                    currentDisplay = ''; return;
                }
                
                let result = Math.log10(value);

                let formatted = parseFloat(result.toFixed(5)).toString();
                currentDisplay = formatted;
                document.querySelector('#display').value = currentDisplay;
            } catch (e) {
                document.querySelector('#display').value = 'Error';
                currentDisplay = '';
            }
        }

        function computeSqrt() {
            try {
                let expr = currentDisplay.trim();

                if (expr === '') return;

                let value = eval(expr);

                if (value < 0) {
                    document.querySelector('#display').value = 'Error';
                    currentDisplay = ''; return;
                }
                
                let result = Math.sqrt(value);

                let formatted = parseFloat(result.toFixed(5)).toString();
                currentDisplay = formatted;
                document.querySelector('#display').value = currentDisplay;
            } catch (e) {
                document.querySelector('#display').value = 'Error';
                currentDisplay = '';
            }
        }
    </script>
</body>
</html>
